<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/navbar :: head('Login')}"></head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon"><i class="fa-solid fa-bus"></i></span>
            <h1 class="auth-title">GoBus</h1>
            <p class="auth-subtitle">Log in to your account</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div id="ajaxLoginMessage" class="alert alert-error ajax-login-message" hidden></div>

        <form action="/login" method="post" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" th:value="${rememberedEmail}" placeholder="name@email.com" required/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password" required/>
            </div>
            <label class="checkbox-field" for="rememberMe">
                <input type="checkbox" id="rememberMe" name="rememberMe" value="true" th:checked="${rememberMe}"/>
                <span>Remember me on this device</span>
            </label>
            <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>

        <p class="auth-footer">Don't have an account? <a th:href="@{/register}">Register now</a></p>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
    $("#loginForm").on("submit", function(event) {
        event.preventDefault();

        const $message = $("#ajaxLoginMessage");
        const $button = $("#loginForm button[type='submit']");

        $message.prop("hidden", true);
        $button.prop("disabled", true).html('<i class="fa-solid fa-circle-notch fa-spin"></i> Logging in...');

        $.ajax({
            url: "/api/login",
            type: "post",
            contentType: "application/json",
            dataType: "json",
            data: JSON.stringify({
                email: $("#email").val(),
                password: $("#password").val(),
                rememberMe: $("#rememberMe").is(":checked")
            }),
            success: function(res) {
                if (res.code === 200) {
                    location.href = res.redirectUrl;
                } else {
                    $message.text(res.message || "Login failed. Please try again.").prop("hidden", false);
                }
            },
            error: function() {
                $message.text("Unable to login right now. Please try again.").prop("hidden", false);
            },
            complete: function() {
                $button.prop("disabled", false).html("Log In");
            }
        });
    });
</script>
</body>
</html>
