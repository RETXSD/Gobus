<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/navbar :: head('Register')}"></head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon"><i class="fa-solid fa-bus"></i></span>
            <h1 class="auth-title">GoBus</h1>
            <p class="auth-subtitle">Create a new account</p>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form action="/register" method="post" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required/>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="name@email.com" required/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>

        <p class="auth-footer">Already have an account? <a th:href="@{/login}">Log In now</a></p>
    </div>
</div>
</body>
</html>
