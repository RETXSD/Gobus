<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/navbar :: head('Notifications')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar(${session.user}, ${unreadCount})}"></nav>

<div class="container">
    <div class="page-header">
        <h1><i class="fa-solid fa-bell"></i> Notifications</h1>
        <p>All your trip reminders and confirmations</p>
    </div>

    <div th:if="${#lists.isEmpty(notificationList)}" class="empty-card">
        <span class="empty-icon"><i class="fa-solid fa-bell-slash fa-3x"></i></span>
        <p>No notifications yet.</p>
        <a th:href="@{/user/schedule}" class="btn btn-primary">Find Bus Schedule</a>
    </div>

    <div class="notification-list" th:if="${!#lists.isEmpty(notificationList)}">
        <div th:each="n : ${notificationList}"
             th:class="${n.read} ? 'notification-item notification-read' : 'notification-item notification-unread'">
            <div class="notification-dot" th:if="${!n.read}"></div>
            <div class="notification-content">
                <p class="notification-message" th:text="${n.message}">Notification message</p>
                <span class="notification-time" th:text="${#temporals.format(n.sendTime, 'dd MMM yyyy, HH:mm')}">01 Jan 2025</span>
            </div>
        </div>
    </div>

</div>
</body>
</html>
