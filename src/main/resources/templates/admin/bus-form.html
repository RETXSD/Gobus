<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/admin-sidebar :: admin-head('Bus Form')}"></head>
<body class="admin-body">

<aside th:replace="~{fragments/admin-sidebar :: sidebar(${session.user})}"></aside>

<div class="admin-main">
    <div class="page-header">
        <h1>
            <i th:class="${bus.id != null} ? 'fa-solid fa-pen-to-square' : 'fa-solid fa-bus'"></i>
            <span th:text="${bus.id != null} ? ' Edit Bus' : ' Add Bus'">Add Bus</span>
        </h1>
    </div>

    <div class="form-card">
        <form th:action="@{/admin/bus/save}" method="post">
            <input type="hidden" name="id" th:value="${bus.id}"/>

            <div class="form-group">
                <label for="brand">Bus Brand</label>
                <input type="text" id="brand" name="brand" th:value="${bus.brand}"
                       placeholder="e.g. Haryanto, Sinar Jaya, Rosalia Indah" required/>
            </div>

            <div class="form-group">
                <label for="plateNumber">Plate Number</label>
                <input type="text" id="plateNumber" name="plateNumber" th:value="${bus.plateNumber}"
                       placeholder="e.g. B 1234 CD" required/>
            </div>

            <div class="form-group">
                <label for="totalSeats">Total Seats</label>
                <input type="number" id="totalSeats" name="totalSeats" th:value="${bus.totalSeats}"
                       min="1" max="60" placeholder="e.g. 40" required/>
            </div>

            <div class="form-actions">
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Back</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk"></i>
                    <span th:text="${bus.id != null} ? ' Update Bus' : ' Save Bus'">Save Bus</span>
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
